<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="env" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#4DA6FF"/>
      <stop offset="1" stop-color="#1B82FB"/>
    </linearGradient>
    <linearGradient id="shield" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#3D9BFF"/>
      <stop offset="1" stop-color="#0C66E0"/>
    </linearGradient>
  </defs>

  <!-- Envelope body -->
  <rect x="48" y="130" width="372" height="252" rx="46" fill="url(#env)"/>

  <!-- Flap -->
  <path d="M74 162 L234 282 L394 162" fill="none" stroke="#ffffff"
        stroke-width="26" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Security shield badge (bottom-right) -->
  <!-- white moat for clean separation from the envelope -->
  <path d="M332 318 Q332 300 350 300 L446 300 Q464 300 464 318
           L464 363 C464 417 427 446 398 450
           C369 446 332 417 332 363 Z" fill="#ffffff"/>
  <!-- shield -->
  <path d="M346 328 Q346 312 362 312 L434 312 Q450 312 450 328
           L450 364 C450 409 421 433 398 436
           C375 433 346 409 346 364 Z" fill="url(#shield)"/>
  <!-- checkmark -->
  <path d="M374 376 L392 396 L424 352" fill="none" stroke="#ffffff"
        stroke-width="17" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
